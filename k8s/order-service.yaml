apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  labels:
    app: order-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
    spec:
      containers:
        - name: order-service
          # For minikube: build with eval $(minikube docker-env) first
          # For GKE: change to gcr.io/YOUR_PROJECT/order-service:latest
          image: delivery/order-service:latest
          imagePullPolicy: IfNotPresent   # use local image, don't try to pull
          ports:
            - containerPort: 8090
          env:
            - name: KAFKA_BROKER
              value: "kafka-service:9092"  # K8s internal DNS for the kafka Service
          resources:
            requests:
              cpu: "100m"      # 0.1 vCPU — what the pod is guaranteed
              memory: "64Mi"
            limits:
              cpu: "500m"      # 0.5 vCPU — hard ceiling
              memory: "256Mi"
          livenessProbe:       # K8s restarts pod if this fails 3 times
            httpGet:
              path: /health
              port: 8090
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:      # K8s won't send traffic until this passes
            httpGet:
              path: /health
              port: 8090
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: order-service
spec:
  selector:
    app: order-service
  ports:
    - port: 80          # external port (what other pods call)
      targetPort: 8090  # internal port (what the container listens on)
  type: ClusterIP       # internal only; use Ingress to expose externally
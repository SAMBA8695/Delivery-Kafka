apiVersion: apps/v1
kind: Deployment
metadata:
  name: location-service
  labels:
    app: location-service
spec:
  replicas: 2           # starts at 2, HPA scales up to 10
  selector:
    matchLabels:
      app: location-service
  template:
    metadata:
      labels:
        app: location-service
    spec:
      containers:
        - name: location-service
          image: delivery-tracker/location-service:latest
          ports:
            - containerPort: 8081
          env:
            - name: KAFKA_BROKER
              value: "kafka-service:9092"
          resources:
            requests:
              cpu: "200m"     # HPA scales on CPU — set this accurately
              memory: "64Mi"
            limits:
              cpu: "1000m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: location-service
spec:
  selector:
    app: location-service
  ports:
    - port: 80
      targetPort: 8081
  type: ClusterIP
---
# Horizontal Pod Autoscaler
# At lunch hour when GPS pings spike, K8s will automatically
# add more location-service pods — up to 10.
# It checks CPU every 30s and scales if average > 60%.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: location-service-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: location-service
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
